<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series Results</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

  <!-- HEADER -->
  <header class="navbar">
    <button onclick="history.back()" class="menu">
      <span class="material-symbols-rounded">
arrow_back_ios_new
</span>
    </button>

    <div class="logo">CINESTREAM</div>

    <button id="menu" class="menu">
      <span class="material-icons">tv</span>
    </button>
  </header>

  <!-- TITLE -->
  <section class="section" style="margin-top: 35px">

    <h2 id="resultTitle" class="search-title" style="text-transform: capitalize;">Series Results</h2>

    <div id="resultGrid" class="movie-grid"></div>

    <div id="noResult" class="no-result">
      No series found
    </div>

  </section>

  <!-- LOADER -->
  <div id="loader" class="loader" class="hidden"></div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="series-search-result.js"></script>
</body>
</html>
